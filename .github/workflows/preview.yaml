name: Vercel Preview Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  COSMIC_BUCKET_SLUG: ${{ secrets.COSMIC_BUCKET_SLUG }}
  COSMIC_READ_KEY: ${{ secrets.COSMIC_READ_KEY }}
  COSMIC_WRITE_KEY: ${{ secrets.COSMIC_WRITE_KEY }}
  NEXT_PUBLIC_BEHOLD_FEED_URL: ${{ secrets.NEXT_PUBLIC_BEHOLD_FEED_URL }}
on:
  push:
    branches-ignore:
      - main
jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Verify required environment variables
        run: |
          test -n "$COSMIC_BUCKET_SLUG" || (echo "::error::Missing COSMIC_BUCKET_SLUG GitHub secret" && exit 1)
          test -n "$COSMIC_READ_KEY" || (echo "::error::Missing COSMIC_READ_KEY GitHub secret" && exit 1)
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
