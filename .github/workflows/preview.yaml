name: Vercel Preview Deployment
# Only the Vercel identifiers belong here. App secrets (COSMIC_*, NEXT_PUBLIC_*)
# must live in the Vercel project's Environment Variables so they are present at
# BOTH build (via `vercel pull`) and runtime (injected into the deployment).
# Putting them here only satisfies the build and silently ships broken functions.
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches-ignore:
      - main
jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Verify Cosmic env vars were pulled from Vercel
        run: |
          envfile=$(ls .vercel/.env.preview.local .vercel/.env.local 2>/dev/null | head -n1)
          if [ -z "$envfile" ]; then
            echo "::error::vercel pull did not create an env file under .vercel/. Check token/org/project scope."
            exit 1
          fi
          echo "Inspecting $envfile"
          echo "Keys present in pulled Vercel env (names only, values hidden):"
          grep -oE '^[A-Z0-9_]+' "$envfile" | sort
          for key in COSMIC_BUCKET_SLUG COSMIC_READ_KEY COSMIC_WRITE_KEY; do
            if ! grep -q "^$key=" "$envfile"; then
              echo "::error::$key was NOT pulled from the Vercel project. It is not set for the Preview environment (or the token/org scope is wrong)."
              exit 1
            fi
            val=$(grep "^$key=" "$envfile" | head -n1 | cut -d= -f2-)
            val="${val%\"}"; val="${val#\"}"; val="${val%\'}"; val="${val#\'}"
            val=$(printf '%s' "$val" | tr -d '[:space:]')
            if [ -z "$val" ]; then
              echo "::error::$key is present but EMPTY in the Vercel project. Set its actual value in Vercel for the Preview environment."
              exit 1
            fi
          done
          echo "All required Cosmic vars were pulled and are non-empty."
      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
